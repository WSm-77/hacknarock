services:
  postgres:
    image: postgres:17
    container_name: postgres-local
    environment:
      POSTGRES_DB: hacknarock_testdb
      POSTGRES_USER: hacknarock_test_user
      POSTGRES_PASSWORD: hacknarock_test_user_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacknarock_test_user -d hacknarock_testdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_dumps:/dumps

volumes:
  postgres_data: