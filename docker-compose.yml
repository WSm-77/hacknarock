services:
  postgres:
    image: postgres:17
    container_name: postgres-local-hacknarock
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hacknarock_testdb}
      POSTGRES_USER: ${POSTGRES_USER:-hacknarock_test_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hacknarock_test_user_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_dumps:/dumps

volumes:
  postgres_data: