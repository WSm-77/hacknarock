services:
  backend:
    build:
      context: ./backend
    container_name: backend-local-hacknarock
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hacknarock_test_user}:${POSTGRES_PASSWORD:-hacknarock_test_user_password}@postgres:5432/${POSTGRES_DB:-hacknarock_testdb}
      FRONTEND_CORS_ORIGINS: ${FRONTEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: node:20-alpine
    container_name: frontend-local-hacknarock
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: postgres-local-hacknarock
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hacknarock_testdb}
      POSTGRES_USER: ${POSTGRES_USER:-hacknarock_test_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hacknarock_test_user_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_dumps:/dumps

volumes:
  postgres_data:
  frontend_node_modules: